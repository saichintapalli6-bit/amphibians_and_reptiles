{% extends 'users/userbase.html' %}
{% load static %}

{% block contents %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>classification of Amphibians and Reptiles</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #007bff;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Input Your Data for Addiction Prediction</h1>
        <form method="post" action="{% url 'prediction' %}">
            {% csrf_token %}
        
            <label for="whatsapp">Whatsapp:</label>
            <input type="number" name="whatsapp" required placeholder="Ex: 9">

            <label for="instagram">Instagram:</label>
            <input type="number" name="instagram" required placeholder="Ex: 7">

            <label for="snapchat">Snapchat:</label>
            <input type="number" name="snapchat" required placeholder="Ex: 2">

            <label for="facebook">Facebook:</label>
            <input type="number" name="facebook" required placeholder="Ex: 0">

            <label for="tiktok">TikTok:</label>
            <input type="number" name="tiktok" required placeholder="Ex: 0">

            <label for="wechat">WeChat:</label>
            <input type="number" name="wechat" required placeholder="Ex: 0">

            <label for="linkedin">LinkedIn:</label>
            <input type="number" name="linkedin" required placeholder="Ex:4 ">

            <label for="total_time">Total Screen Time:</label>
            <input type="number" name="total_time" required placeholder="Ex: 22">

            <label for="hourly_open">Hourly Opens:</label>
            <input type="number" name="hourly_open" required placeholder="Ex:111 ">

            <button type="submit">Predict</button>
        </form>
    </div>
</body>
</html>

{% endblock %}
