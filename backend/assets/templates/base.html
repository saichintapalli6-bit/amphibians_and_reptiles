{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <title>Classfication of Reptiles and Amphibians</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background-image: url("{% static 'image.jpg' %}");
            background-size: cover;
            background-position: center;
            color: rgb(11, 4, 1);
        }

        .sidebar {
            width: 100%;
            background-color: transparent;
            /* Removed black color */
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Top navbar format */
        }

        .sidebar h2 {
            margin: 0;
            color: #FFA500;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            font-size: 1.8rem;
        }

        .sidebar .nav {
            flex-direction: row !important;
            gap: 15px;
        }

        .content {
            flex-grow: 1;
            padding: 20px;
            margin-left: 0;
            /* Remove old sidebar offset */
            display: flex;
            flex-direction: column;
            /* align-items: center; */
            background-color: transparent;
        }

        .nav-link {
            margin-bottom: 0;
            color: white;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 12px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* Hover effect */
        .nav-link:hover {
            color: #FFD700;
            background: linear-gradient(135deg, #0056b3, #003d82);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        footer {
            text-align: center;
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            color: white;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Classification of Reptiles and Amphibians</h2>
        <div class="nav">
            <a class="nav-link home" href="{% url 'index' %}">Home</a>
            <a class="nav-link user-login" href="{% url 'UserLogin' %}">User Login</a>
            <a class="nav-link admin-login" href="{% url 'AdminLogin' %}">Admin Login</a>
            <a class="nav-link create-account" href="{% url 'UserRegisterForm' %}">Create Account</a>
        </div>
    </div>

    <div class="content">
        {% block contents %}
        {% endblock %}
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
